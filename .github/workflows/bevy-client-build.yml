name: Bevy Client Build

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "bevy/**"
      - ".github/workflows/bevy-client-build.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "bevy/**"
      - ".github/workflows/bevy-client-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: Ubuntu 22.04
            binary: glyphweave
            artifact: glyphweave-linux-ubuntu
          - platform: windows-latest
            name: Windows
            binary: glyphweave.exe
            artifact: glyphweave-windows
          - platform: macos-14
            name: macOS
            binary: glyphweave
            artifact: glyphweave-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bevy dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libasound2-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config \
            wayland-protocols

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            bevy -> target
          cache-on-failure: true

      - name: Run Bevy workspace tests
        working-directory: bevy
        run: cargo test --workspace --locked --verbose

      - name: Build Bevy client
        working-directory: bevy
        run: cargo build -p glyphweave-app --bin glyphweave --locked --verbose

      - name: Get short SHA
        if: github.event_name == 'workflow_dispatch'
        id: slug
        shell: bash
        run: echo "sha8=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Upload client artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}-${{ steps.slug.outputs.sha8 }}
          path: bevy/target/debug/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 7

  arch-wayland:
    name: Build on Arch Linux (Wayland)
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - name: Install Arch dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            alsa-lib \
            base-devel \
            ca-certificates \
            clang \
            git \
            libx11 \
            libxcursor \
            libxi \
            libxinerama \
            libxkbcommon \
            libxrandr \
            mesa \
            nodejs \
            pkgconf \
            systemd-libs \
            wayland \
            wayland-protocols

      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Wayland environment
        run: |
          echo "WAYLAND_DISPLAY=wayland-1" >> "$GITHUB_ENV"
          echo "GDK_BACKEND=wayland" >> "$GITHUB_ENV"
          echo "XDG_SESSION_TYPE=wayland" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            bevy -> target
          cache-on-failure: true

      - name: Run Bevy workspace tests
        working-directory: bevy
        run: cargo test --workspace --locked --verbose

      - name: Build Bevy client
        working-directory: bevy
        run: cargo build -p glyphweave-app --bin glyphweave --locked --verbose

      - name: Get short SHA
        if: github.event_name == 'workflow_dispatch'
        id: slug
        shell: bash
        run: echo "sha8=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Upload client artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: glyphweave-linux-arch-wayland-${{ steps.slug.outputs.sha8 }}
          path: bevy/target/debug/glyphweave
          if-no-files-found: error
          retention-days: 7
